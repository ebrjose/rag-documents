services:
  postgres:
    image: postgres:16-alpine
    container_name: rag-da-postgres
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag_da
    ports:
      - "5435:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_da"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: rag-da-qdrant
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - ./volumes/qdrant:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
